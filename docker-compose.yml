version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: financial-compass-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: financial_compass
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - financial-compass-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: financial-compass-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - financial-compass-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financial-compass-api
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: development
      PORT: 5001
      MONGODB_URI: mongodb://root:rootpassword@mongodb:27017/financial_compass?authSource=admin
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRE: 7d
      REDIS_URL: redis://redis:6379
      NEWS_API_KEY: ${NEWS_API_KEY:-your_key_here}
      LOG_LEVEL: debug
      CORS_ORIGIN: http://localhost:8082,http://localhost:5173
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - financial-compass-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/dashboard/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financial-compass-web
    ports:
      - "8082:80"
    environment:
      VITE_API_URL: http://localhost:5001/api
      VITE_ENV: development
    depends_on:
      - backend
    networks:
      - financial-compass-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MongoDB Express (Web UI for MongoDB - Development Only)
  mongo-express:
    image: mongo-express:latest
    container_name: financial-compass-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpassword
      ME_CONFIG_MONGODB_URL: mongodb://root:rootpassword@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    depends_on:
      - mongodb
    networks:
      - financial-compass-network
    profiles:
      - dev  # Only run with: docker-compose --profile dev up

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  financial-compass-network:
    driver: bridge

# Usage:
# Development (with MongoDB Express):
#   docker-compose --profile dev up -d
#
# Production (without MongoDB Express):
#   docker-compose up -d
#
# Stop services:
#   docker-compose down
#
# View logs:
#   docker-compose logs -f backend
#   docker-compose logs -f frontend
#
# Access points:
#   Frontend: http://localhost:8082
#   Backend API: http://localhost:5001/api
#   MongoDB Express: http://localhost:8081 (dev only)
#   MongoDB: mongodb://root:rootpassword@localhost:27017
#   Redis: redis://localhost:6379
